perform_sweep: True
parameter_space:
  seed: !sweep
    default: 1
    range: [8]

  num_epochs: 50

  RC_model:

    # Settings for the neural network
    NeuralNet:
      type: mlp
      lookback: 96 #amount of timesteps input for param estimation | 4 or 96

      num_layers: 3
      nodes_per_layer:
        default: 20
      optimizer: Adam

    # Settings for the training
    Training:
      mode: predict


      model_type: RC
      slicing_difference: 96
      loss_function:
        name: RMSELoss
        kwargs:
          reduction: sum
      device: cpu
      num_threads: ~

      # Can scale parameters here
      scaling_factors:
        C: 1.0e7
        R: 1.0e-2
        A_eff: 10
