# Plot the marginals together
_marginals/mlpv:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.density
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss
    subspace:
      type: [mlp0]

  transform:
    - loss_to_probs: [!dag_tag loss]
      kwargs:
        optimizer: just_negate_loss #just_negate_loss, subtract_min, divide_by_median, pure_negexp
        mlp: pure_negexp
    - list_by_dims: [!dag_prev , [path]]
    - cut_nans_from_dataset: [!dag_prev ]
      tag: probabilities
    # Flatten the prob and parameter samples into a single dimension
    - flatten_dims_except: [!dag_tag probabilities , parameters, sample]
      tag: prob

    - list_by_dims: [!dag_tag parameters, [path]]
    - cut_nans_from_dataset: [!dag_prev ]
    - flatten_dims_except: [!dag_prev , parameters, sample]
      tag: params
    - broadcast: [!dag_tag params, !dag_tag prob]
      tag: broad

  # generate coordinates for density plots over multiple paths
    - .coords: [!dag_tag loss, path]
    - list: [!dag_prev ]
    - map_pathnames: [!dag_prev ]
    - xr.DataArray:
      kwargs:
        data: !dag_prev
        dims: path
        coords:
          path: !dag_prev
      tag: new_coord

    # Get the marginals along the parameters
    - marginal_from_ds: [!dag_tag broad]
      kwargs:
        x: x
        y: loss
        exclude_dim: [parameter]
        bins: 100
        fit_kde: True
      tag: list_data

  # concat marginals for different paths along previously generated coordinate
    - xr.concat: [!dag_prev ]
      kwargs:
        dim: !dag_tag new_coord
      tag: data

  alpha: 0.7
  linewidth: 0.6
  x: x
  y: kde
  col: parameter
  hue: path
  sharex: False
  sharey: False
  store_csv: True

