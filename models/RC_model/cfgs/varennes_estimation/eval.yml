# Plot the predictions over time, colour-coded by loss
_predictions/mlpv:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.scatter
  select_and_combine:
    fields:
      parameters:
        path: parameters
        transform: [.data]
      loss:
        path: loss
        transform: [.data]
    subspace:
      type: [mlp0]
  transform:
    - broadcast_dims: [!dag_tag parameters, !dag_tag loss, [batch, parameter]]
    - flatten_dims_except: [!dag_prev , [parameter, batch], sample]
      tag: data
  x: batch
  y: x
  hue: loss
  col: parameter
  marker: .
  linewidths: 0          # Removes white outline
  edgecolors: none       # No edge color
  sharey: False # Seems to have no effect?
  sharex: False
  helpers:
    set_limits:
      x: [min, max]
      y: [0, max] # Why is this necessary?
  add_legend: False
  norm:
    name: LogNorm
  cmap:
    continuous: true
    from_values:
      0: !dag_result c_yellow
      0.2: !dag_result c_orange
      0.4: !dag_result c_pink
      0.6: !dag_result c_purple
      0.8: !dag_result c_lightblue
      1: !dag_result c_darkblue

