_marginals/csv:
  based_on:
    - .creator.multiverse
  creator: multiverse
  plot_func: marginals_to_csv
  module: model_plots.RC_model.data_evaluation_utils
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss

  transform:
    - loss_to_probs: [!dag_tag loss]
      kwargs:
        optimizer: just_negate_loss #just_negate_loss, subtract_min, divide_by_median, pure_negexp
        mlp: pure_negexp

    - list_by_dims: [!dag_prev , [slicing_difference, type]]
    - cut_nans_from_dataset: [!dag_prev ]
      tag: probabilities
    # Flatten the prob and parameter samples into a single dimension
    - flatten_dims_except: [!dag_tag probabilities , parameters, sample]
      tag: prob

    - list_by_dims: [!dag_tag parameters, [slicing_difference, type]]
    - cut_nans_from_dataset: [!dag_prev ]
    - flatten_dims_except: [!dag_prev , parameters, sample]
      tag: params
    - broadcast: [!dag_tag params, !dag_tag prob]
      tag: broad

    # generate coordinates for density plots over multiple paths
    - .coords: [!dag_tag loss, slicing_difference]
    - list: [!dag_prev ]
    - map_pathnames: [!dag_prev ]
      tag: path_coords
    - .coords: [!dag_tag loss, type]
    - .values: [!dag_prev ]
    - list: [!dag_prev ]
    - cart_prod_string: [!dag_tag path_coords, !dag_prev ]
      tag: list_dims
    - xr.DataArray:
      kwargs:
        data: !dag_prev
        dims: slicing_difference
        coords:
          path: !dag_prev
      tag: new_coord

    # Get the marginals along the parameters
    - marginal_from_ds: [!dag_tag broad]
      kwargs:
        x: x
        y: loss
        exclude_dim: [parameter]
        bins: 100
        fit_kde: True
      tag: list_data

    # concat marginals for different paths along previously generated coordinate
    - xr.concat: [!dag_prev ]
      kwargs:
        dim: !dag_tag new_coord
      tag: data
  list_data: !dag_result list_data
  list_dims: !dag_result list_dims

# plot the simulation of the model using the predicted parameters and the residuals.
parameter_evaluation:
  based_on:
    - .creator.multiverse
    - model_pred
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss
      dt:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , dt]
      rc_data: RC_data
      start_index:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , data_used_up_to]
  transform:
    - evaluate_to_bars: [!dag_tag parameters, !dag_tag loss]
      kwargs:
        groupings: [slicing_difference, type]
        mean_over: [None]
        #mean_over: [None]
        # input evaluation method(s) for any parameter of the parameter space in an array
        # it is recommended to only modify the eval methods of one sweep dimension (e.g. type)
        # currently only works on string parameters and PLEASE DONT TOUCH THE MODEL TYPE
        # (the tool was mainly designed for different evaluation for types, e.g. optimizer-last, optimizer-best)
        eval_method:
          optimizer: [best]
          #mlp: [marginals, best]
        dt: !dag_tag dt
        rc_data: !dag_tag rc_data
        bar_colors: [!dag_tag c_lightblue, !dag_tag c_darkblue, !dag_tag c_purple, !dag_tag c_red, !dag_tag c_orange, !dag_tag c_lightbrown]
        bins: 500
        horizon: 96
        simulate_from_index: !dag_tag start_index
        marginals_key: y
      tag: evaluation

    # store the simulation results and plot args into accessible dag_tags
    - getitem: [!dag_tag evaluation , simulation]
      tag: simulation
    - getitem: [!dag_tag simulation, 0]
      tag: data
    - getitem: [!dag_tag simulation, 1]
      tag: delta
    - getitem: [!dag_tag simulation, 2]
      tag: maes 
    - getitem: [!dag_tag simulation, 3]
      tag: rmses 
    - getitem: [!dag_tag evaluation, bar_ticks]
      tag: bar_ticks
    - getitem: [!dag_tag evaluation, time_coords]
      tag: time_coords
    - getitem: [!dag_tag evaluation, bar_colors]
      tag: bar_colors
    - getitem: [!dag_tag evaluation, bar_x]
      tag: bar_x
    - getitem: [!dag_tag evaluation, bar_ticks_x]
      tag: bar_ticks_x
    - getitem: [!dag_tag evaluation, groupings]
    - str: [!dag_prev ]
    - add: ["hyperparameters\t", !dag_prev ]
      tag: bar_legend


