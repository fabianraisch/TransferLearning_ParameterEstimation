_mlppreds/T2:
  based_on:
    - .creator.multiverse
  creator: multiverse
  module: dantro.plot.funcs
  plot_func: multiplot
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss
      model_type:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , model_type]
      dt:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , dt]
      rc_data:
        path: RC_data
        transform:
          - getitem: [!dag_prev , 0]
      start_index:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , data_used_up_to]
         # - getitem: [!dag_prev , 0]
    subspace:
      type: [mlp0]
      path: [data/RC_model/NN_parameter_estimation/8targets_nnEstim_noWin_inhom_noAct/#Uex_0.25#HeaWal_40000#FawSou_0.16#ZonLen_7#Roo_22#Roo_21#Wea_Bratislava#Int_NoActivity]
  transform:
    # Divide the loss by the median to prevent numerical underflow
    - .median: [!dag_tag loss, 'batch']
    - div: [!dag_tag loss, !dag_prev ]
    - neg_exp: [!dag_prev ]
      tag: probabilities
    # format probabilites into 1D-array and broadcast it with loss
    - flatten_dims_except: [!dag_tag probabilities , parameters, sample]
      tag: prob
    - flatten_dims_except: [!dag_tag parameters , parameters, sample]
      tag: params
    - broadcast: [!dag_tag params, !dag_tag prob]
    #- filter_loss: [!dag_prev , 4.48]
    #- pick_specific_sample: [!dag_prev , "best"]


    # Get the marginals along the parameters
    - marginal_from_ds: [!dag_prev ]
      kwargs:
        x: x
        y: loss
        exclude_dim: [parameter]
        bins: 200
        fit_kde: True
      tag: marginals
    # simulate the model data
    - simulate_model: !dag_prev 
      kwargs:
        marginals_key: kde
        model_type: !dag_tag model_type
        dt: !dag_tag dt
        rc_data: !dag_tag rc_data
        horizon: 96
        simulate_from_index: !dag_tag start_index
        #simulate_from_index: 0
      tag: simulation
    # select time array from data
    - .coords: [!dag_tag rc_data, time]
    - mul: [!dag_prev , !dag_tag dt]
    - select_first_uni_time_coords: [!dag_prev ]
    - .values: [!dag_tag dt]
    - getitem: [!dag_prev , 0]
      tag: single_dt
    - getitem: [!dag_tag start_index, 0]
    - np.arange: [!dag_prev , ]
    - mul: [!dag_prev , !dag_tag single_dt]
      tag: time_coords

    - getitem: [!dag_tag simulation, 0]
      tag: data
    - getitem: [!dag_tag simulation, 1]
      tag: delta
    - getitem: [!dag_tag simulation, 2]
      tag: mae
    - getitem: [!dag_tag simulation, 3]
      tag: rmse
    - getitem: [!dag_tag simulation, 4]
      tag: global_mae
    - getitem: [!dag_tag simulation, 5]
      tag: global_rmse
    - prepare_error_label: [!dag_tag mae, !dag_tag rmse, !dag_tag global_mae, !dag_tag global_rmse]
      tag: delta_label
  helpers:
    setup_figure:
      ncols: 1
      nrows: 2
      sharex: true

    set_suptitle:
      title: Real data vs model simulation using estimated parameters

    set_labels:
      x: Time [indices, not seconds!]
      only_label_outer: false
  to_plot:
    [0, 0]:
      - function: plt.plot
        args:
  #          - !dag_result time_coords
          - !dag_result data
        label: [ground truth, simulated]
      - function: [matplotlib.pyplot, ylabel]
        args: [inside temperature (°C)]
      - function: [matplotlib.pyplot, legend]
    [0, 1]:
      - function: plt.plot
        args:
  #          - !dag_result time_coords
          - !dag_result delta
        label: [!dag_result delta_label]
