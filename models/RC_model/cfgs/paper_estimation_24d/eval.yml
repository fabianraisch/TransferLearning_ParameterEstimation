# plot the simulation of the model using the predicted parameters and the residuals.
parameter_evaluation:
  based_on:
    - .creator.multiverse
    - model_pred
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss
      dt:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , dt]
      rc_data: RC_data
      start_index:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , data_used_up_to]
  transform:
    - evaluate_to_bars: [!dag_tag parameters, !dag_tag loss]
      kwargs:
        groupings: [type]
        mean_over: [path]
        #mean_over: [None]
        # input evaluation method(s) for any parameter of the parameter space in an array
        # it is recommended to only modify the eval methods of one sweep dimension (e.g. type)
        # currently only works on string parameters and PLEASE DONT TOUCH THE MODEL TYPE
        # (the tool was mainly designed for different evaluation for types, e.g. optimizer-last, optimizer-best)
        eval_method:
          optimizer: [best]
          #mlp: [marginals, best]
        dt: !dag_tag dt
        rc_data: !dag_tag rc_data
        bar_colors: [!dag_tag c_lightblue, !dag_tag c_darkblue, !dag_tag c_purple, !dag_tag c_red, !dag_tag c_orange, !dag_tag c_lightbrown]
        bins: 100
        horizon: 96
        simulate_from_index: !dag_tag start_index
        marginals_key: kde
      tag: evaluation

    # store the simulation results and plot args into accessible dag_tags
    - getitem: [!dag_tag evaluation , simulation]
      tag: simulation
    - getitem: [!dag_tag simulation, 0]
      tag: data
    - getitem: [!dag_tag simulation, 1]
      tag: delta
    - getitem: [!dag_tag simulation, 2]
      tag: maes 
    - getitem: [!dag_tag simulation, 3]
      tag: rmses 
    - getitem: [!dag_tag evaluation, bar_ticks]
      tag: bar_ticks
    - getitem: [!dag_tag evaluation, time_coords]
      tag: time_coords
    - getitem: [!dag_tag evaluation, bar_colors]
      tag: bar_colors
    - getitem: [!dag_tag evaluation, bar_x]
      tag: bar_x
    - getitem: [!dag_tag evaluation, bar_ticks_x]
      tag: bar_ticks_x
    - getitem: [!dag_tag evaluation, groupings]
    - str: [!dag_prev ]
    - add: ["hyperparameters\t", !dag_prev ]
      tag: bar_legend


model_pred_csv:
  based_on:
    - .creator.multiverse
  creator: multiverse
  plot_func: export_simulation_to_csv
  module: model_plots.RC_model.data_evaluation_utils
  select_and_combine:
    fields:
      parameters: parameters
      loss: loss
      dt:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , dt]
      rc_data: RC_data
      start_index:
        path: parameters
        transform:
          - .attrs
          - getitem: [!dag_prev , data_used_up_to]
  transform:
    - evaluate_to_bars: [!dag_tag parameters, !dag_tag loss]
      kwargs:
        groupings: [type]
        mean_over: [path]

        # input evaluation method(s) for any parameter of the parameter space in an array
        # it is recommended to only modify the eval methods of one sweep dimension (e.g. type)
        # currently only works on string parameters and PLEASE DONT TOUCH THE MODEL TYPE
        # (the tool was mainly designed for different evaluation for types, e.g. optimizer-last, optimizer-best)
        eval_method:
          optimizer: [best]
        dt: !dag_tag dt
        rc_data: !dag_tag rc_data
        bar_colors: [!dag_tag c_lightblue, !dag_tag c_darkblue, !dag_tag c_purple, !dag_tag c_red, !dag_tag c_orange, !dag_tag c_lightbrown]
        bins: 100
        horizon: 96
        simulate_from_index: !dag_tag start_index
        marginals_key: kde
