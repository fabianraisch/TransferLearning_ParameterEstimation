#  ╔╦╗╔═╗╔╦╗╔═╗╦  ╔═╗╔╦╗╔═╗╔═╗
#   ║ ║╣ ║║║╠═╝║  ╠═╣ ║ ║╣ ╚═╗
#   ╩ ╚═╝╩ ╩╩  ╩═╝╩ ╩ ╩ ╚═╝╚═╝
# ======================================================================================================================
# -- Overloads ---------------------------------------------------------------------------------------------------------
# Overload some configs to insert model-specific settings
.creator.universe:
  based_on:
    - .creator.universe
    - .default_style
    - .meta_ops

  dag_options:
    select_path_prefix: *base_path

.creator.multiverse:
  based_on:
    - .creator.multiverse
    - .default_style
    - .meta_ops

  select_and_combine:
    base_path: *base_path

# Base function for probability densities
.plot.facet_grid.density:
  based_on: .plot.facet_grid
  kind: density

# Base function for barplots
.plot.facet_grid.bar:
  based_on: .plot.facet_grid
  kind: bar

# ======================================================================================================================
#  ╔═╗╦  ╔═╗╔╦╗╔═╗
#  ╠═╝║  ║ ║ ║ ╚═╗
#  ╩  ╩═╝╚═╝ ╩ ╚═╝
# ======================================================================================================================

# -- Plot of the training loss -----------------------------------------------------------------------------------------
loss:
  based_on:
    - .creator.universe
    - .plot.facet_grid.line
  select:
    data: loss
  color: black
  helpers:
    set_labels:
      x: Batch
      y: Training loss
    set_scales:
      y: log

loss_mv:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.line
  select_and_combine:
    fields:
      loss_multi: loss
  transform:
    - flatten_dims_except: [!dag_tag loss_multi , batch, uni]
      tag: data
  helpers:
    set_labels:
      x: Batch
      y: Training loss
    set_scales:
      y: log
  x: batch
  y: loss

# -- Plot of the parameter predictions  --------------------------------------------------------------------------------
predictions_uni:
  based_on:
    - .creator.universe
    - .plot.facet_grid.line
  select:
    data:
      path: parameters
      transform:
        - .data: [ !dag_prev ]
  col: parameter
  sharey: False
  style:
    figure.figsize: [ !dag_result half_width, !dag_result half_width ]

# Multiverse predictions
predictions_mv:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.line
  select_and_combine:
    fields:
      data:
        path: parameters
        transform:
          - .data: [ !dag_prev ]
  col: parameter
  x: batch
  add_legend: False
  sharey: False
  style:
    figure.figsize: [ !dag_result half_width, !dag_result half_width ]
# Distribution of the initial values (multiverse plot)
initial_values:
  based_on:
    - .creator.multiverse
    - .plot.facet_grid.bar
  select_and_combine:
    fields:
      values:
        path: parameters
        transform:
          - .isel_with_drop: [!dag_prev , {batch: 0}]
  transform:
    - hist: [!dag_tag values]
      kwargs:
        dim: 'seed'
        exclude_dim: [parameter]
        bins: 100
      tag: data
  col: parameter
  x: x
  y: parameters
  color: !dag_result c_darkblue
  sharex: False
  helpers:
    set_labels:
      x: ''
      y: ''


# -- plot of the simulations and errors using the predicted parameters -------------------------------------------------------

# yaml-dantro-dag plot func that takes simulation data, residuals and bar heights alongside legends and plots them alltogether.
# written to work in tandem with the evaluate_to_bars function above.

model_pred:
  creator: multiverse
  module: dantro.plot.funcs
  plot_func: multiplot
    
  helpers:
    setup_figure:
      ncols: 1
      nrows: 3
      sharex: false
      figsize: [10, 5]

    set_suptitle:
      title: Real data vs model simulation using estimated parameters

  to_plot:
    [0, 0]:
      - function: plt.plot
        args:
          - !dag_result time_coords
          - !dag_result data
        #label: !dag_result comp_labels
        alpha: 0.2
        linewidth: 0.4
      - function: [matplotlib.pyplot, ylabel]
        args: [inside temperature (°C)]
      - function: [matplotlib.pyplot, xlabel]
        args: [Time/s]
    [0, 1]:
      - function: plt.plot
        args:
          - !dag_result time_coords
          - !dag_result delta
        alpha: 0.2
        linewidth: 0.4
      - function: [matplotlib.pyplot, ylabel]
        args: [derivation of the simulation (°C)]
      - function: [matplotlib.pyplot, xlabel]
        args: [Time/s]
    [0, 2]:
      - function: plt.bar
        args:
          - !dag_result bar_x
          - !dag_result rmses
        width: 0.05
        color: "lightgray"
        zorder: 1
      - function: plt.bar
        args:
          - !dag_result bar_x
          - !dag_result maes
        width: 0.04
        color: !dag_result bar_colors
        zorder: 2
      - function: [matplotlib.pyplot, xticks]
        args: [!dag_result bar_x, !dag_result bar_ticks]
        rotation: 45
        rotation_mode: anchor
        ha: right
        va: top
      - function: [matplotlib.pyplot, xlabel]
        args: [!dag_result bar_legend]
      - function: [matplotlib.pyplot, ylabel]
        args: [MAE (colored)/RMSE (grey)]







