#  ╦  ╦╔═╗╦═╗╦╔═╗╔╗ ╦  ╔═╗╔═╗
#  ╚╗╔╝╠═╣╠╦╝║╠═╣╠╩╗║  ║╣ ╚═╗
#   ╚╝ ╩ ╩╩╚═╩╩ ╩╚═╝╩═╝╚═╝╚═╝
# ======================================================================================================================
.variables:
  base_path:        &base_path    data/RC_model

.meta_ops:
  dag_options:
    meta_operations:
      neg_exp:
        - mul: [!arg 0 , -1]
        - np.exp: [!dag_prev ]
      .isel_with_drop:
        - .isel: [!arg 0, !arg 1]
          kwargs: {drop: True}
      .sel_with_drop:
        - .sel: [!arg 0, !arg 1]
          kwargs: {drop: True}

      prepare_error_label:
        - str: [!arg 0]
          tag: short_mae
        - str: [!arg 1]
          tag: short_rmse
        - str: [!arg 2]
          tag: long_mae
        - str: [!arg 3]
          tag: long_rmse
        - add: ["residuals (test mae: ", !dag_tag short_mae]
        - add: [!dag_prev , ", test rmse: "]
        - add: [!dag_prev , !dag_tag short_rmse]
        - add: [!dag_prev , ", global mae: "]
        - add: [!dag_prev , !dag_tag long_mae]
        - add: [!dag_prev , ", global rmse: "]
        - add: [!dag_prev , !dag_tag long_rmse]
        - add: [!dag_prev , ")"]


      # dantro-yaml-DAG function that automatically orders and compares estimation runs over arbitrary sweep dimensions
      # takes in raw data and returns np.arrays of every simulation performed using parameters, the residuals, some legends and
      # MAE and RMSE of the simulation w/ respect to ground truth as bar plots ordered following thg "groupings" kwarg.
      #
      # args:
      #     - !arg 0: parameter history of estimation run
      #     - !arg 1: corresponding loss
      # kwargs:
      #     - !kwarg mean_over: list of dimensions whose errors are meaned over to get resulting error, like multiple buildings ('path')
      #     - !kwarg eval_method: dictionary of type {'key': 'method'} for different parameter selection strategies (like {'optimizer': 'best'})
      #                           non-specified optimization methods are marginalized as per usual
      #     - !kwarg rc_data: ground truth data
      #     - !kwarg groupings: list of dimensions that corresponds to how the resulting bars are grouped and ordered
      #     - !kwarg dt: the dt used in training and for evaluation, should match the dt of ground thruth data
      #     - !kwarg marginals_key: 'y' for standart bayesian marginalization, 'kde' transforms the marginals once using scipy.stats.gaussian_kde
      #     - !kwarg horizon: the amount of timesteps the physical model is evolved before being reset to ground truth
      #     - !kwarg simulate_from_index: the index in ground truth, from the simulation's error is considered.
      #                           Used for separating train and test ranges
      evaluate_to_bars:
        - get_mean_over_count: [!arg 0, !kwarg mean_over]
          tag: mean_over_count


        - prepare_data_for_eval_method: [!arg 0, !kwarg eval_method]
          tag: param_data
        - prepare_data_for_eval_method: [!arg 1, !kwarg eval_method]
          tag: loss_data
        - prepare_data_for_eval_method: [!kwarg rc_data, !kwarg eval_method]
          tag: external_data
        - bar_plot_groups: [!dag_tag param_data, !kwarg groupings]
          tag: bar_x
        - add: [!kwarg groupings, !kwarg mean_over]
        - get_model_types_from_multiverse: [!dag_tag param_data, !dag_prev ]
          tag: model_types


          # format probabilites into 1D-array and broadcast it with loss
        - loss_to_probs: [!dag_tag loss_data]
          kwargs:
            optimizer: just_negate_loss #just_negate_loss, subtract_min, divide_by_median, pure_negexp
            mlp: pure_negexp
        - list_by_dims: [!dag_prev , !kwarg groupings]
        - list_by_dims: [!dag_prev , !kwarg mean_over]
        - cut_nans_from_dataset: [!dag_prev ]
          tag: probabilities

        - list_by_dims: [!dag_tag param_data, !kwarg groupings]
        - list_by_dims: [!dag_prev , !kwarg mean_over]
        - cut_nans_from_dataset: [!dag_prev ]
          tag: params_list
        - list_by_dims: [!dag_tag external_data, !kwarg groupings]
        - list_by_dims: [!dag_prev , !kwarg mean_over]
          tag: rc_data_list

          # format probabilites (negexp of loss) into 1D-array and broadcast it with parameters (foreach on array)
        - flatten_dims_except: [!dag_tag probabilities , parameters, sample]
          tag: prob
        - flatten_dims_except: [!dag_tag params_list , parameters, sample]
          tag: params
        - broadcast: [!dag_tag params, !dag_tag prob]

        - filter_for_eval_method: [!dag_prev , !kwarg groupings, !kwarg eval_method]
          kwargs:
            dimdata: !dag_tag param_data
            mean_over_count: !dag_tag mean_over_count
        - marginal_from_ds: [!dag_prev ]
          kwargs:
            x: x
            y: loss
            exclude_dim: [parameter]
            bins: !kwarg bins
            fit_kde: True
          tag: marginals

          # get plot labels
        - add: [[true_data] , !dag_tag model_types]
          #- myprint: [!dag_prev ]
          tag: comp_labels
        - cart_prod_string: [["delta - ", "mae - "], !dag_tag model_types]
          #- myprint: [!dag_prev ]
          tag: delta_labels

          # select time array from data
        - .coords: [!dag_tag external_data, time]
        - mul: [!dag_prev , !kwarg dt]
        - select_first_uni_time_coords: [!dag_prev ]
          tag: time_coords

          #create bar colour array
        - get_color_array: [!kwarg bar_colors, !kwarg groupings, !dag_tag param_data]
          tag: bar_colors

        # generate ticks for bars describing the unique parameters
        - get_permut_description: [!dag_tag param_data, !kwarg groupings]
          tag: bar_ticks

        - add: [!kwarg groupings, !kwarg mean_over]
        - get_permut_description: [!dag_tag param_data, !dag_prev ]
        - cart_prod_string: [["simulation: ", "residuals: "], !dag_prev ]
          tag: csv_heads

          # simulate the model data
        - simulate_model: !dag_tag marginals
          kwargs:
            marginals_key: !kwarg marginals_key
            model_type: !dag_tag model_types
            dt: !kwarg dt
            rc_data: !dag_tag rc_data_list
            horizon: !kwarg horizon
            simulate_from_index: !kwarg simulate_from_index
            mean_over: !dag_tag mean_over_count
          tag: simulation

        # format output dict
        - dict:
            simulation: !dag_tag simulation
            delta_labels: !dag_tag delta_labels
            comp_labels: !dag_tag comp_labels
            bar_ticks: !dag_tag bar_ticks
            bar_colors: !dag_tag bar_colors
            time_coords: !dag_tag time_coords
            bar_x: !dag_tag bar_x
            bar_ticks_x: !dag_tag bar_x
            groupings: !kwarg groupings
            csv_heads: !dag_tag csv_heads
       
       



.default_style:
  dag_visualization:
    enabled: False
  dag_options:
    define: &colors

      # Make colors and page widths accessible across all plots
      c_yellow: '#F5DDA9'
      c_orange: '#EC9F7E'
      c_red: '#ec7070'
      c_pink: '#F8A6A6'
      c_purple: '#A07CB0'
      c_lightblue: '#97c3d0'
      c_darkblue: '#2F7194'
      c_lightgreen: '#AFD8BC'
      c_darkgreen: '#48675A'
      c_lightbrown: '#C6BFA2'
      c_lightgrey: '#AFC1B9'
      c_darkgrey: '#3D4244'

      # Set the page width of the document to allow for easy integration
      _page_width: 7.5

      # These are available for all plots and can be used to adjust the figure size or generate new sizes as needed
      full_width: !dag_tag _page_width
      half_width:
        - div: [!dag_tag _page_width, 2]
      third_width:
        - div: [!dag_tag _page_width, 3]
      two_thirds_width:
        - div: [!dag_tag _page_width, 3]
        - mul: [!dag_prev , 2]
      quarter_width:
        - div: [!dag_tag _page_width, 4]
      fifth_width:
        - div: [!dag_tag _page_width, 5]

  style:
    text.usetex: False   # Set to 'True' to use latex
    font.family: 'Arial' # Set to a font family of your choice, e.g. Helvetica
    mathtext.fontset:   cm
    text.latex.preamble: \usepackage{amssymb} \usepackage{amsmath}

    # Set the label fontsize
    font.size:          &fontsize 7
    axes.titlesize:     *fontsize
    axes.labelsize:     *fontsize
    xtick.labelsize:    *fontsize
    ytick.labelsize:    *fontsize
    legend.fontsize:    *fontsize
    grid.linewidth:     0.5
    savefig.bbox:       tight
    axes.prop_cycle: !format
      fstr: "cycler('color', ['{colors[c_darkblue]:}',
                              'black',
                              '{colors[c_darkgreen]:}',
                              '{colors[c_lightgreen]:}',
                              '{colors[c_red]:}',
                              '{colors[c_lightblue]:}',
                              '{colors[c_lightbrown]:}',
                              '{colors[c_orange]:}',
                              '{colors[c_yellow]:}',
                              '{colors[c_darkgrey]:}',
                              '{colors[c_pink]:}',
                              '{colors[c_purple]:}',
                              '{colors[c_lightgrey]:}'
                              ])"
      colors:
        <<: *colors
    axes.grid:          True
    axes.spines.top:    False
    axes.spines.right:  False

  helpers:
    save_figure:
      dpi: 900
  file_ext: pdf

.cycler_marginals:
  style:
    axes.prop_cycle: !format
      fstr: "cycler('color', ['{colors[c_darkblue]:}', '{colors[c_pink]:}'])"
      colors:
        <<: *colors

.cycler_green_red_green:
  style:
    axes.prop_cycle: !format
      fstr: "cycler('color', ['{colors[c_lightgreen]:}', '{colors[c_red]:}', '{colors[c_darkgreen]:}',])"
      colors:
        <<: *colors

.cycler_blue_orange_brown:
  style:
    axes.prop_cycle: !format
      fstr: "cycler('color', ['{colors[c_darkblue]:}', '{colors[c_orange]:}', '{colors[c_lightbrown]:}'])"
      colors:
        <<: *colors

.cycler_blue_pink_grey:
  style:
    axes.prop_cycle: !format
      fstr: "cycler('color', ['{colors[c_darkblue]:}', '{colors[c_pink]:}', '{colors[c_darkgrey]:}'])"
      colors:
        <<: *colors

